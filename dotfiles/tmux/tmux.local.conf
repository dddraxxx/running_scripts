# Personal tmux additions.
# Sourced from ~/.tmux.conf via:
#   source-file -q ~/.tmux.local.conf

# prefix + F  -> fork the Claude Code session in the current pane into a new window.
# Uses Claude's native --resume <id> --fork-session, so the original is untouched.
bind-key F run-shell "~/.local/bin/claude-fork.sh '#{pane_id}'"

# Empty the status bar's right side to give window names more room.
set -g status-right ""
set -g status-right-length 0
